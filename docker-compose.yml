services:
  # =====================================================
  # BACKEND — Node.js/Express API
  # =====================================================
  backend:
    build:
      context: ./ProcessIQFileGenerator
      dockerfile: Dockerfile
    container_name: processiq_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8001}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://process1q.duckdns.org}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME:-processiq}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      DEFAULT_USERS_SYNC_PASSWORDS: ${DEFAULT_USERS_SYNC_PASSWORDS:-true}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
      DEFAULT_ADMISSION_PASSWORD: ${DEFAULT_ADMISSION_PASSWORD:-admission123}
      DEFAULT_COMMERCIAL_PASSWORD: ${DEFAULT_COMMERCIAL_PASSWORD:-commercial123}
      DEFAULT_RH_PASSWORD: ${DEFAULT_RH_PASSWORD:-rh123}
      DEFAULT_ELEVE_PASSWORD: ${DEFAULT_ELEVE_PASSWORD:-eleve123}
      DEFAULT_ADMISSION_1_EMAIL: ${DEFAULT_ADMISSION_1_EMAIL}
      DEFAULT_ADMISSION_1_PASSWORD: ${DEFAULT_ADMISSION_1_PASSWORD}
      DEFAULT_ADMISSION_1_NAME: ${DEFAULT_ADMISSION_1_NAME}
      DEFAULT_ADMISSION_2_EMAIL: ${DEFAULT_ADMISSION_2_EMAIL}
      DEFAULT_ADMISSION_2_PASSWORD: ${DEFAULT_ADMISSION_2_PASSWORD}
      DEFAULT_ADMISSION_2_NAME: ${DEFAULT_ADMISSION_2_NAME}
      DEFAULT_ADMISSION_MANAGER_EMAIL: ${DEFAULT_ADMISSION_MANAGER_EMAIL}
      DEFAULT_ADMISSION_MANAGER_PASSWORD: ${DEFAULT_ADMISSION_MANAGER_PASSWORD}
      DEFAULT_ADMISSION_MANAGER_NAME: ${DEFAULT_ADMISSION_MANAGER_NAME}
      DOCUSIGN_ENABLED: ${DOCUSIGN_ENABLED:-false}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY}
      DOCUSIGN_USER_ID: ${DOCUSIGN_USER_ID}
      DOCUSIGN_ACCOUNT_ID: ${DOCUSIGN_ACCOUNT_ID}
      DOCUSIGN_AUTH_SERVER: ${DOCUSIGN_AUTH_SERVER}
      DOCUSIGN_BASE_PATH: ${DOCUSIGN_BASE_PATH}
      DOCUSIGN_RETURN_URL: ${DOCUSIGN_RETURN_URL}
      DOCUSIGN_PRIVATE_KEY_FILE: ${DOCUSIGN_PRIVATE_KEY_FILE:-./secrets/docusign-private.pem}
      DOCUSIGN_SCOPES: ${DOCUSIGN_SCOPES:-signature impersonation}
      DOCUSIGN_WEBHOOK_SECRET: ${DOCUSIGN_WEBHOOK_SECRET}
    volumes:
      - backend_uploads:/app/uploads
      - ./ProcessIQFileGenerator/secrets:/app/secrets:ro
    networks:
      - processiq_net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================================================
  # FRONTEND — React/Vite (built) served by nginx (internal)
  # =====================================================
  frontend:
    build:
      context: ./process-IQ-rush-school
      dockerfile: Dockerfile
      args:
        VITE_BASE_API_URL: /api
    container_name: processiq_frontend
    restart: unless-stopped
    # No external port exposure — traffic flows via the nginx reverse proxy
    depends_on:
      - backend
    networks:
      - processiq_net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # NGINX — Reverse proxy (TLS termination, HTTP→HTTPS)
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: processiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Full HTTPS config (used after certs are issued)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates (shared with certbot)
      - letsencrypt_certs:/etc/letsencrypt:ro
      # ACME challenge webroot (HTTP-01, for compatibility)
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
    networks:
      - processiq_net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # CERTBOT — Let's Encrypt certificate renewal (DNS DuckDNS)
  # =====================================================
  certbot:
    build:
      context: ./certbot
      dockerfile: Dockerfile
    container_name: processiq_certbot
    restart: unless-stopped
    volumes:
      # Certificates stored here, shared with nginx
      - letsencrypt_certs:/etc/letsencrypt
      # ACME challenge webroot (HTTP-01, for compatibility)
      - certbot_www:/var/www/certbot
    # Run renewal check every 12h; certbot only renews when < 30 days left
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --quiet \
            --authenticator dns-duckdns \
            --dns-duckdns-credentials /etc/letsencrypt/duckdns.ini \
            --dns-duckdns-propagation-seconds 60
          sleep 43200
        done
    networks:
      - processiq_net

volumes:
  backend_uploads:
    name: processiq_uploads
  letsencrypt_certs:
    name: processiq_letsencrypt
  certbot_www:
    name: processiq_certbot_www

networks:
  processiq_net:
    name: processiq_network
    driver: bridge
