name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main
  # Triggered by submodule update commits
  repository_dispatch:
    types: [submodule-updated]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📡 Connect & Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: DUCKDNS_TOKEN,CERTBOT_EMAIL
          script: |
            set -e
            echo "▶️  Navigating to project directory"
            cd /opt/processiq

            echo "▶️  Pulling latest parent repo changes"
            git pull origin main

            echo "▶️  Updating submodules to their tracked remote branch"
            git submodule update --init --recursive --remote --merge

            echo "▶️  Writing DuckDNS credentials for certbot renewal"
            mkdir -p /etc/letsencrypt
            echo "dns_duckdns_token = ${DUCKDNS_TOKEN}" > /etc/letsencrypt/duckdns.ini
            chmod 600 /etc/letsencrypt/duckdns.ini

            echo "▶️  Rebuilding Docker images"
            make build

            echo "▶️  Restarting services"
            make up

            echo "✅  Deployment complete!"
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
