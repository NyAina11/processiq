# Minimal HTTP-only config used BEFORE the first certificate is issued.
# Certbot writes certs to /etc/letsencrypt/live/ — this config avoids
# nginx crashing when those files don't exist yet.
server {
    listen 80;
    server_name process1q.duckdns.org;

    # ACME challenge for future HTTP-01 (not used for DNS challenge, kept for safety)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'ProcessIQ — initialisation HTTPS en cours...';
        add_header Content-Type text/plain;
    }
}
