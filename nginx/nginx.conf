# =====================================================================
# ProcessIQ — Nginx Reverse Proxy with TLS (Let's Encrypt)
# Domain: process1q.duckdns.org
# =====================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name process1q.duckdns.org;

    # ACME HTTP-01 challenge (kept for compatibility, main issuance uses DNS challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main block
server {
    listen 443 ssl;
    http2 on;
    server_name process1q.duckdns.org;

    # --- TLS certificates (issued by Let's Encrypt via certbot) ---
    ssl_certificate     /etc/letsencrypt/live/process1q.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/process1q.duckdns.org/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Swagger UI (Back-end Documentation) ---
    # We proxy both /swagger and /api-docs to ensure assets load correctly
    location /swagger {
        proxy_pass http://backend:8001/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://backend:8001/api-docs/ /swagger/;
        proxy_redirect http://backend:8001/api-docs /swagger;
    }

    location /api-docs {
        proxy_pass http://backend:8001/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Proxy to the frontend container (internal Docker network) ---
    location / {
        proxy_pass http://frontend:80;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }
}
